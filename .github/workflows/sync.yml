name: مزامنة الأخبار الدورية

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: تشغيل مزامنة الأخبار
        run: |
          curl -s -X POST "https://sgn-indol.vercel.app/api/sync" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d '{}'
