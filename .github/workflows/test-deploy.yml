name: Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./prisma/test.db"
      NEXTAUTH_SECRET: "test-secret-key-for-ci"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Type check
        run: npm run typecheck
      - name: Build project
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # سيعمل فقط إذا تم تعريف التوكن في Secrets
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4

      - name: Check for Vercel Token
        id: check_token
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::warning:: Vercel Token is missing. Skipping actual deployment step to prevent failure."
          else
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_token.outputs.has_token == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        if: steps.check_token.outputs.has_token == 'true'
        run: npm ci --legacy-peer-deps

      - name: Deploy to Vercel
        if: steps.check_token.outputs.has_token == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          vercel-version: vercel@latest
        env:
          VERCEL_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

      - name: Notify Telegram (Success)
        if: steps.check_token.outputs.has_token == 'true' && success()
        run: |
          curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ SY-NL Platform deployed successfully!"
        continue-on-error: true
