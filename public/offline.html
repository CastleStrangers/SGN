<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الجالية السورية في هولندا - غير متصل</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f0eb; color: #1a1a2e; text-align: center; direction: rtl; }
    .card { background: white; padding: 3rem; border-radius: 1rem; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 420px; margin: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #1a5632; }
    p { color: #6b7280; font-size: 0.9rem; line-height: 1.6; margin: 0; }
    .retry-btn { display: inline-block; margin-top: 1.5rem; padding: 0.6rem 1.5rem; background: #1a5632; color: white; text-decoration: none; border-radius: 0.5rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يرجى التحقق من اتصالك بالإنترنت والمحاولة مرة أخرى. بعض المحتوى قد لا يكون متاحاً حالياً.</p>
    <a href="/" class="retry-btn">إعادة المحاولة</a>
  </div>
</body>
</html>
